<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>AE MCP Bridge</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "Segoe UI", Arial, sans-serif;
            font-size: 12px;
            background: #141414;
            color: #d4d0c8;
            padding: 12px;
            overflow: hidden;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid #2a2a2a;
        }
        .header h1 {
            font-size: 14px;
            font-weight: 600;
            color: #e8a849;
        }

        .status-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #c45c5c;
            transition: background 0.3s;
        }
        .status-dot.connected { background: #6abf69; }
        .status-dot.reconnecting {
            background: #e8a849;
            animation: pulse 1.5s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        .status-label { color: #8a8680; }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
            margin-bottom: 12px;
        }
        .stat-box {
            background: #1e1e1e;
            border: 1px solid #2a2a2a;
            border-radius: 6px;
            padding: 8px;
            text-align: center;
        }
        .stat-value {
            font-size: 18px;
            font-weight: 700;
            color: #e8a849;
        }
        .stat-label {
            font-size: 10px;
            color: #8a8680;
            margin-top: 2px;
        }

        .render-section {
            margin-bottom: 12px;
        }
        .render-section h3 {
            font-size: 11px;
            color: #b5a68a;
            margin-bottom: 4px;
        }
        .render-bar-bg {
            width: 100%;
            height: 8px;
            background: #1e1e1e;
            border-radius: 4px;
            overflow: hidden;
        }
        .render-bar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #e8a849, #6abf69);
            border-radius: 4px;
            transition: width 0.5s;
        }
        .render-status {
            font-size: 10px;
            color: #8a8680;
            margin-top: 3px;
        }

        .log-section {
            flex: 1;
        }
        .log-section h3 {
            font-size: 11px;
            color: #b5a68a;
            margin-bottom: 4px;
        }
        .log-area {
            background: #0c0c0c;
            border: 1px solid #2a2a2a;
            border-radius: 6px;
            padding: 8px;
            font-family: "Cascadia Code", "Consolas", monospace;
            font-size: 10px;
            height: 120px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-all;
            color: #8a8680;
        }
        .log-entry.error { color: #c45c5c; }
        .log-entry.success { color: #6abf69; }
        .log-entry.info { color: #e8a849; }

        .history-section { margin-bottom: 12px; }
        .history-section h3 { font-size: 11px; color: #b5a68a; margin-bottom: 4px; }
        .history-area {
            background: #0c0c0c;
            border: 1px solid #2a2a2a;
            border-radius: 6px;
            padding: 6px;
            font-family: "Cascadia Code", "Consolas", monospace;
            font-size: 10px;
            max-height: 100px;
            overflow-y: auto;
        }
        .history-entry { padding: 2px 4px; border-radius: 3px; margin-bottom: 2px; }
        .history-entry.success { color: #6abf69; }
        .history-entry.error { color: #c45c5c; }
    </style>
</head>
<body>
    <div class="header">
        <h1>AE MCP Bridge</h1>
        <span id="version" style="font-size:10px; color:#5a5650;">v0.1.0</span>
    </div>

    <div class="status-row">
        <div class="status-dot" id="statusDot"></div>
        <span class="status-label" id="statusLabel">Waiting for connection...</span>
    </div>

    <div class="stats">
        <div class="stat-box">
            <div class="stat-value" id="clientCount">0</div>
            <div class="stat-label">Clients</div>
        </div>
        <div class="stat-box">
            <div class="stat-value" id="cmdCount">0</div>
            <div class="stat-label">Commands</div>
        </div>
    </div>

    <div class="render-section" id="pipelineSection" style="display:none;">
        <h3>Apollova Pipeline</h3>
        <div class="render-bar-bg">
            <div class="render-bar-fill" id="pipelineBar" style="background: linear-gradient(90deg, #e8a849, #c45c5c);"></div>
        </div>
        <div class="render-status" id="pipelineStatus">Idle</div>
    </div>

    <div class="render-section">
        <h3>Render Progress</h3>
        <div class="render-bar-bg">
            <div class="render-bar-fill" id="renderBar"></div>
        </div>
        <div class="render-status" id="renderStatus">Idle</div>
    </div>

    <div class="history-section">
        <h3>Command History</h3>
        <div class="history-area" id="historyArea"></div>
    </div>

    <div class="log-section">
        <h3>Activity Log</h3>
        <div class="log-area" id="logArea"></div>
    </div>

    <script src="js/CSInterface.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/main.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
